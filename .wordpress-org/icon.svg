<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">Date Today Nepali plugin icon</title>
  <desc id="desc">Minimal icon showing BS to AD date conversion and the Nepali word आज on a gray background.</desc>

  <defs>
    <style>
      @font-face {
        font-family: "NotoNepaliSubset";
        src: url("data:font/woff2;base64,") format("woff2");
        font-weight: 700;
        font-style: normal;
      }

      .bg { fill: #e0e0e2; }
      .card { fill: #f8f8f9; }
      .red { fill: #dc2c2c; }
      .dark { fill: #36404e; }
      .ink { fill: #242c38; }
      .muted { fill: #d4d6db; }
      .white { fill: #ffffff; }
      .font {
        font-family: "NotoNepaliSubset", sans-serif;
        font-weight: 700;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .shadow { fill: #000000; opacity: 0.12; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="128" height="128"/>

  <!-- Shadows -->
  <rect class="shadow" x="12" y="20" width="44" height="44" rx="9"/>
  <rect class="shadow" x="72" y="20" width="44" height="44" rx="9"/>
  <rect class="shadow" x="33" y="78" width="62" height="42" rx="10"/>

  <!-- Top cards -->
  <rect class="card" x="12" y="18" width="44" height="44" rx="9"/>
  <rect class="card" x="72" y="18" width="44" height="44" rx="9"/>
  <rect class="red" x="12" y="18" width="44" height="13" rx="9"/>
  <rect class="red" x="12" y="24" width="44" height="7"/>
  <rect class="red" x="72" y="18" width="44" height="13" rx="9"/>
  <rect class="red" x="72" y="24" width="44" height="7"/>

  <!-- Bottom card -->
  <rect class="card" x="33" y="76" width="62" height="42" rx="10"/>
  <rect class="dark" x="33" y="76" width="62" height="13" rx="10"/>
  <rect class="dark" x="33" y="82" width="62" height="7"/>

  <!-- Rings -->
  <rect x="21" y="11" width="5" height="13" rx="2.5" fill="#2b3442"/>
  <rect x="40" y="11" width="5" height="13" rx="2.5" fill="#2b3442"/>
  <rect x="81" y="11" width="5" height="13" rx="2.5" fill="#2b3442"/>
  <rect x="100" y="11" width="5" height="13" rx="2.5" fill="#2b3442"/>
  <rect x="41" y="71" width="5" height="13" rx="2.5" fill="#f5f5f5"/>
  <rect x="77" y="71" width="5" height="13" rx="2.5" fill="#f5f5f5"/>

  <!-- Labels -->
  <text class="font white" x="34" y="25.5" font-size="12">BS</text>
  <text class="font white" x="94" y="25.5" font-size="12">AD</text>

  <!-- Years -->
  <text class="font ink" x="34" y="46.5" font-size="21">२०८१</text>
  <text class="font ink" x="94" y="46.5" font-size="21">2024</text>

  <!-- Separator suggesting conversion -->
  <rect x="60" y="36" width="8" height="8" rx="4" fill="#b5b9bf"/>
  <rect x="61" y="37" width="6" height="6" rx="3" fill="#cdd0d5"/>

  <!-- Bottom label -->
  <text class="font white" x="64" y="87" font-size="19">आज</text>

  <!-- Grid -->
  <g class="muted">
    <rect x="41" y="97" width="4" height="4" rx="1"/>
    <rect x="48" y="97" width="4" height="4" rx="1"/>
    <rect x="55" y="97" width="4" height="4" rx="1"/>
    <rect x="62" y="97" width="4" height="4" rx="1"/>
    <rect x="69" y="97" width="4" height="4" rx="1"/>
    <rect x="76" y="97" width="4" height="4" rx="1"/>
    <rect x="83" y="97" width="4" height="4" rx="1"/>

    <rect x="41" y="107" width="4" height="4" rx="1"/>
    <rect x="48" y="107" width="4" height="4" rx="1"/>
    <rect x="55" y="107" width="4" height="4" rx="1"/>
    <rect x="62" y="107" width="4" height="4" rx="1"/>
    <rect x="69" y="107" width="4" height="4" rx="1"/>
    <rect x="76" y="107" width="4" height="4" rx="1"/>
    <rect x="83" y="107" width="4" height="4" rx="1"/>
  </g>
</svg>
